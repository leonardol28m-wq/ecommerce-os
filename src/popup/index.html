<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce OS</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 420px; height: 600px; overflow: hidden; background: #08080F; }
